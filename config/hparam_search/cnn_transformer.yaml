# @package _global_
# Optuna hyperparameter search for the CNN-Transformer model.
# Run with:
#   python -m emg2qwerty.train --config-name cnn_transformer \
#     --multirun +hparam_search=cnn_transformer \
#     trainer.max_epochs=30

defaults:
  - override /hydra/sweeper: optuna

hydra:
  sweep:
    subdir: job${hydra.job.num}
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    direction: minimize
    study_name: cnn_transformer_hpo
    storage: null           # use in-memory storage; set to sqlite:///hpo.db to persist
    n_trials: 20
    n_jobs: 1               # 1 = sequential (single GPU)
    params:
      # Optimizer
      optimizer.lr: tag(log, interval(5e-5, 5e-3))
      optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
      # Regularization
      module.dropout: interval(0.05, 0.3)
      # Architecture
      module.model_dim: choice(128, 192, 256)
      module.num_layers: choice(2, 4, 6)
      module.nhead: choice(4, 8)
      module.dim_feedforward: choice(512, 1024)
