# @package _global_
# Optuna hyperparameter search for the Conformer model.
# Run with:
#   python -m emg2qwerty.train --config-name conformer \
#     --multirun +hparam_search=conformer \
#     trainer.max_epochs=30

defaults:
  - override /hydra/sweeper: optuna

hydra:
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    direction: minimize
    study_name: conformer_hpo
    storage: null           # use in-memory storage; set to sqlite:///hpo.db to persist
    n_trials: 30
    n_jobs: 1               # 1 = sequential (single GPU)
    params:
      # Optimizer
      optimizer.lr: tag(log, interval(5e-5, 5e-3))
      optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
      # Regularization
      module.dropout: interval(0.05, 0.3)
      # Architecture
      module.model_dim: choice(128, 192, 256)
      module.num_layers: choice(2, 4, 6, 8)
      module.conv_kernel_size: choice(15, 31, 63)
      module.nhead: choice(4, 8)
