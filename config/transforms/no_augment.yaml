# @package _global_
# Ablation: no augmentation, only log spectrogram preprocessing.
to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 64
  hop_length: 16

transforms:
  train:
    - ${to_tensor}
    - ${logspec}

  val:
    - ${to_tensor}
    - ${logspec}

  test: ${transforms.val}
