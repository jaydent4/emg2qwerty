# @package _global_
module:
  _target_: emg2qwerty.lightning.TransformerCTCModule
  in_features: 1040  # freq * channels = (n_fft // 2 + 1) * 16
  mlp_features: [512, 512]
  transformer_features: 256  # d_model in "Attention Is All You Need"
  num_heads: 8
  num_layers: 4
  dim_feedforward: 512  # 4 * transformer_features
  dropout: 0.3

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
